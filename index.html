<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Facturación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span>FacturNet</span>
        </div>
        <nav>
            <a href="#" class="nav-item active" onclick="mostrarSeccion('dashboard')">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="#" class="nav-item" onclick="mostrarSeccion('nuevo')">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Nuevo Cliente
            </a>
            <a href="#" class="nav-item" onclick="mostrarSeccion('clientes')">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Clientes
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="totalClientes">0 clientes</span>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main">

        <!-- Dashboard -->
        <section id="sec-dashboard" class="seccion">
            <div class="page-header">
                <h1>Dashboard</h1>
                <span class="fecha-hoy" id="fechaHoy"></span>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Clientes</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Activos</div>
                    <div class="stat-value verde" id="statActivos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">En Mora</div>
                    <div class="stat-value rojo" id="statMora">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Facturación Mensual</div>
                    <div class="stat-value azul" id="statValor">$0</div>
                </div>
            </div>
            <div class="cortes-hoy">
                <h2>Cortes de hoy</h2>
                <div id="listaCortes" class="lista-cortes"></div>
            </div>
        </section>

        <!-- Nuevo Cliente -->
        <section id="sec-nuevo" class="seccion oculto">
            <div class="page-header">
                <h1 id="tituloFormulario">Nuevo Cliente</h1>
            </div>
            <div class="form-card">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="field">
                        <label>Nombre completo</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="field">
                        <label>Teléfono</label>
                        <input type="text" id="telefono" placeholder="Ej: 3001234567">
                    </div>
                    <div class="field">
                        <label>Correo electrónico</label>
                        <input type="email" id="correo" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="field">
                        <label>Dirección</label>
                        <input type="text" id="direccion" placeholder="Calle y número">
                    </div>
                    <div class="field">
                        <label>Plan</label>
                        <input type="text" id="plan" placeholder="Ej: Plan 20MB">
                    </div>
                    <div class="field">
                        <label>Valor mensual ($)</label>
                        <input type="number" id="valor" placeholder="0">
                    </div>
                    <div class="field">
                        <label>Fecha inicio</label>
                        <input type="date" id="fecha_inicio">
                    </div>
                    <div class="field">
                        <label>Fecha de corte</label>
                        <input type="date" id="fecha_corte">
                    </div>
                    <div class="field">
                        <label>Estado</label>
                        <select id="estado">
                            <option value="activo">Activo</option>
                            <option value="suspendido">Suspendido</option>
                            <option value="mora">Mora</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="cancelarEdicion()">Cancelar</button>
                    <button class="btn-primary" onclick="guardarCliente()">Guardar Cliente</button>
                </div>
            </div>
        </section>

        <!-- Lista de Clientes -->
        <section id="sec-clientes" class="seccion oculto">
            <div class="page-header">
                <h1>Clientes Registrados</h1>
                <div class="header-actions">
                    <input type="text" id="busqueda" placeholder="Buscar cliente..." oninput="filtrarClientes()" class="input-busqueda">
                    <select id="filtroEstado" onchange="filtrarClientes()" class="select-filtro">
                        <option value="">Todos</option>
                        <option value="activo">Activos</option>
                        <option value="mora">En mora</option>
                        <option value="suspendido">Suspendidos</option>
                    </select>
                </div>
            </div>
            <div class="tabla-container">
                <table class="tabla">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Plan</th>
                            <th>Valor</th>
                            <th>Fecha Corte</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaClientes"></tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<!-- Modal Factura -->
<div id="modalFactura" class="modal-overlay oculto">
    <div class="modal">
        <div class="modal-header">
            <h3>Factura Generada</h3>
            <button class="modal-close" onclick="cerrarModal()">✕</button>
        </div>
        <div id="previewFactura" class="factura-preview"></div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="cerrarModal()">Cerrar</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Enviar por WhatsApp
            </button>
            <button class="btn-primary" onclick="descargarPDF()">
                Descargar PDF
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast oculto"></div>

<script src="app.js"></script>
</body>
</html>
